# Application
spring.application.name=BookCycle

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/bookcycle_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=BookCycleSecretKey2025IndiaBookExchangePlatformVeryLongSecretKey!@#$
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=./uploads

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000